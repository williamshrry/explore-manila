<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tour Pre-War Manila</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Panzoom -->
  <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>
</head>

<body>

  <!-- MAIN VIEWER -->
  <div id="viewer-container">

    <button class="nav-btn left" id="prevBtn">&#10094;</button>

    <div id="image-wrapper">
      <img id="main-image" src="images/img1.jpg" draggable="false"/>
    </div>

    <button class="nav-btn right" id="nextBtn">&#10095;</button>

  </div>

  <!-- ORBIT MAP -->
  <div id="orbit-panel">

    <div id="orbit-header">
      ORBIT MAP
    </div>

    <div id="map-container">

      <img id="topview" src="images/topview.jpg" draggable="false"/>

      <div id="node-layer"></div>

    </div>

  </div>

  <script src="script.js"></script>

  <audio id="bg-music" loop>

  <source src="audio/music.mp3" type="audio/mpeg">

</audio>

</body>
</html>
