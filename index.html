<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Manila Interactive</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- BACKGROUND VIEWER -->
  <div id="viewer">

    <div id="imageContainer">
      <img id="mainImage" src="" alt="Historical Manila View">
    </div>

    <div id="overlay"></div>

    <!-- TOP INFO -->
    <div id="topBar">
      <div class="title">
        Manila Interactive
      </div>

      <div class="subtitle">
        Interactive perspectives around the Manila Post Office
      </div>
    </div>

    <!-- ORBIT COMPASS -->
  <div id="orbitUI">

    <img id="orbitMap" src="images/topview.png" />
  
    <div class="orbitCenter"></div>
  
    <div id="orbitNodes"></div>

  </div>

    <!-- IMAGE INFO -->
    <div id="photoInfo">
      <div id="photoTitle">Loading...</div>
      <div id="photoMeta"></div>
    </div>

    <!-- CONTROLS -->
    <div id="controls">
      <button id="leftBtn">←</button>
      <button id="rightBtn">→</button>
    </div>

  </div>

  <script src="photos.js"></script>
  <script src="script.js"></script>

</body>
</html>
